spring.config.import=optional:file:./.env[.properties]

spring.application.name=auth-service
server.port=${AUTH_PORT:5001}

spring.data.mongodb.uri=${DB_AUTH_URI}
spring.data.mongodb.database=${DB_AUTH_NAME}
spring.data.mongodb.database.users=${DB_USER_NAME}

spring.data.mongodb.auto-index-creation=true

# Redis (Upstash TLS)
spring.data.redis.url=${REDIS_URL}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:true}

jwt.secret=${JWT_SECRET}
jwt.expiration=900000
jwt.refresh-expiration=2592000000

# Device service
services.device.url=${DEVICE_SERVICE_URL:http://device-service:5006}
