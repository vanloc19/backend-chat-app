# ─── Network ──────────────────────────────────────────────
bind 0.0.0.0
port 6379
protected-mode no
tcp-backlog 511
timeout 300
tcp-keepalive 60

# ─── Persistence ──────────────────────────────────────────
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ─── Memory Management ────────────────────────────────────
maxmemory 256mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# ─── Connections ──────────────────────────────────────────
maxclients 100

# ─── Logging ──────────────────────────────────────────────
loglevel notice
slowlog-log-slower-than 10000
slowlog-max-len 128
latency-monitor-threshold 100
