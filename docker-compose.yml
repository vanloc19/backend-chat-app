networks:
  chat-network:
    driver: bridge

volumes:
  kafka_data:

services:
  # ─── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - chat-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── RabbitMQ ─────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped
    networks:
      - chat-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ─── Kafka ────────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.1
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped
    networks:
      - chat-network

  # ─── Nginx ────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    networks:
      - chat-network
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t 2>&1 | grep -q 'test is successful'"]
      interval: 20s
      timeout: 5s
      retries: 3

  # ─── Auth Service ─────────────────────────────────────────
  auth-service:
    build:
      context: ./services/auth-services
      dockerfile: ../../infra/docker/Dockerfile.auth
    container_name: auth-service
    ports:
      - "5001:5001"
    env_file:
      - ./services/auth-services/.env
    environment:
      REDIS_URL: redis://redis:6379
      REDIS_SSL_ENABLED: "false"
    restart: unless-stopped
    networks:
      - chat-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:5001/api/auth/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── User Service ─────────────────────────────────────────
  user-service:
    build:
      context: ./services/users-services
      dockerfile: ../../infra/docker/Dockerfile.user
    container_name: user-service
    ports:
      - "5005:5005"
    env_file:
      - ./services/users-services/.env
    restart: unless-stopped
    networks:
      - chat-network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:5005/api/users/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── Device Service ───────────────────────────────────────
  device-service:
    build:
      context: ./services/device-service
      dockerfile: ../../infra/docker/Dockerfile.device
    container_name: device-service
    ports:
      - "5006:5006"
    env_file:
      - ./services/device-service/.env
    restart: unless-stopped
    networks:
      - chat-network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:5006/api/devices/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── Friend Service ───────────────────────────────────────
  friend-service:
    build:
      context: ./services/friend-services
      dockerfile: ../../infra/docker/Dockerfile.friend
    container_name: friend-service
    ports:
      - "5002:5002"
    env_file:
      - ./services/friend-services/.env
    environment:
      MESSAGE_BROKER_URL: amqp://guest:guest@rabbitmq:5672
    restart: unless-stopped
    networks:
      - chat-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:5002/ 2>&1 | grep -qv 'failed' || exit 0"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─── Messenger Service ────────────────────────────────────
  messenger-service:
    build:
      context: ./services/messenger-services
      dockerfile: ../../infra/docker/Dockerfile.messenger
    container_name: messenger-service
    ports:
      - "5003:5003"
    env_file:
      - ./services/messenger-services/.env
    restart: unless-stopped
    networks:
      - chat-network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:5003/ 2>&1 | grep -qv 'failed' || exit 0"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─── Notification Service ─────────────────────────────────
  notification-service:
    build:
      context: ./services/notification-services
      dockerfile: ../../infra/docker/Dockerfile.notification
    container_name: notification-service
    ports:
      - "5004:5004"
    env_file:
      - ./services/notification-services/.env
    environment:
      MESSAGE_BROKER_URL: amqp://guest:guest@rabbitmq:5672
    restart: unless-stopped
    networks:
      - chat-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:5004/ 2>&1 | grep -qv 'failed' || exit 0"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─── API Gateway ─────────────────────────────────────────
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: ../../infra/docker/Dockerfile.gateway
    container_name: api-gateway
    ports:
      - "5000:5000"
    env_file:
      - ./services/api-gateway/.env
    restart: unless-stopped
    networks:
      - chat-network
    depends_on:
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      device-service:
        condition: service_started
      friend-service:
        condition: service_started
      messenger-service:
        condition: service_started
      notification-service:
        condition: service_started
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:5000/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
